<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Page 2</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .top-links {
            margin-bottom: 20px;
        }

        .top-links a {
            text-decoration: none;
            color: blue;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            margin-top: 10px;
            padding: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="top-links">
    <a href="/">⬅ Back to Page 1</a>
</div>

<h2>Contact Form - Page 2 (Website B)</h2>

<form id="contactForm2">

    <!-- ✅ NEW: Identify Website B -->
    <input type="hidden" name="site" value="B">

    <input type="text" name="name" placeholder="Enter Name" required>
    <input type="text" name="phone" placeholder="Enter Phone" required>
    <input type="email" name="email" placeholder="Enter Email" required>
    <textarea name="message" placeholder="Enter Message" required></textarea>

    <button type="submit">Submit</button>

</form>

<script>
document.getElementById("contactForm2").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    try {
        const response = await fetch("https://pyhton-first-form.onrender.com/submit", {
            method: "POST",
            body: new URLSearchParams(formData)
        });

        const data = await response.json();

        console.log("Response:", data);

        if (response.ok) {
            alert("✅ Data saved successfully!");
            this.reset();
        } else {
            alert("❌ Error: " + JSON.stringify(data));
        }

    } catch (error) {
        console.error("Error:", error);
        alert("❌ Request failed: " + error.message);
    }
});
</script>

</body>
</html>
